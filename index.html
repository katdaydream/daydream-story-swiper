 pulls the first sentence under a heading more than anything else.", "c": "geo"}, {"t": "AI engines prioritize content that's been recently updated. A blog post from 2023 with no updates is invisible to AI. Add a \"Last Updated\" date and refresh quarterly.", "c": "geo"}, {"t": "Original data gets cited. If you can share real numbers from your business (\"we've styled 200+ events in Tampa\"), AI engines treat that as a credible source.", "c": "geo"}, {"t": "Long, detailed service descriptions beat short cute taglines for GEO. AI needs substance to cite you. \"We make events pop!\" gives it nothing to work with.", "c": "geo"}, {"t": "Write content that directly answers questions your ideal client would ask AI. \"What should I budget for a balloon installation?\" Answer it clearly on your site.", "c": "geo"}, {"t": "Your About page is a GEO powerhouse. AI engines use it to verify who you are, what you specialize in, and whether you're a real authority. Make it detailed.", "c": "geo"}, {"t": "Blog posts with specific, actionable advice get cited by AI more than generic inspiration posts. Teach something real and AI will reward you.", "c": "geo"}, {"t": "Check your robots.txt file. If you're blocking GPTBot, ClaudeBot, or PerplexityBot, you're literally telling AI not to read your site. That's a self-inflicted wound.", "c": "geo"}, {"t": "Fast-loading pages still matter for GEO. AI crawlers have time limits just like Google. If your site takes 8 seconds to load, AI might give up before reading it.", "c": "geo"}, {"t": "Your Google Business Profile feeds directly into AI answers about local businesses. If it's not fully optimized with services, hours, photos, and reviews, you're invisible to AI.", "c": "geo"}, {"t": "When a bride asks ChatGPT \"best wedding planner near me,\" it recommends businesses with detailed service pages, real reviews, and clear pricing info. Not sites with just a photo gallery.", "c": "geo"}, {"t": "AI is the new referral. Instead of asking friends, people are asking ChatGPT for recommendations. Your website content is your new word-of-mouth.", "c": "geo"}, {"t": "\"Balloon artist near me\" gets searched thousands of times a month. Now it also gets asked to AI thousands of times. Your site needs to answer both.", "c": "geo"}, {"t": "Event planners with niche pages (\"corporate event planning in Austin\" or \"luxury birthday parties in Miami\") get cited by AI way more than sites with one generic services page.", "c": "geo"}, {"t": "Your competitor has a beautiful Instagram but 47 words on their entire website. AI can't recommend what it can't read. That's your advantage.", "c": "geo"}, {"t": "Location pages aren't just for Google Maps anymore. When someone asks Perplexity for \"event planners in Scottsdale,\" it pulls from pages that specifically mention Scottsdale.", "c": "geo"}, {"t": "It's not just ChatGPT. People search for services on Perplexity, Google Gemini, Claude, and Copilot. GEO helps you show up across ALL of them.", "c": "geo"}, {"t": "Google AI Overviews pull from the top 10 organic results 99.5% of the time. So good SEO is still the foundation. GEO is what makes AI actually choose YOU from that top 10.", "c": "geo"}, {"t": "Perplexity cites its sources with links. When it recommends your business, people can click directly to your site. That's higher-quality traffic than a Google search result.", "c": "geo"}, {"t": "Only 34% of businesses have trained their teams on GEO. The other 66% are about to wonder why their traffic is dropping. Be in the 34%.", "c": "geo"}, {"t": "47% of brands don't have a GEO strategy at all. In the event industry, it's probably closer to 95%. That's your window to dominate before everyone catches on.", "c": "geo"}, {"t": "Companies with GEO training outperform those without by 44%. Not 4%. Forty-four percent. This isn't a nice-to-have.", "c": "geo"}, {"t": "Your competitors are still fighting over Instagram likes. You could be the first balloon artist in your city that AI actually recommends by name.", "c": "geo"}, {"t": "The GEO market is growing 34% per year and will hit $7.3 billion by 2031. This is where the smart money is going. This is where your attention should go too.", "c": "geo"}, {"t": "Most web designers have never heard of GEO. Most marketing coaches can't explain it. If your business is optimized for AI search, you're already years ahead.", "c": "geo"}, {"t": "Stop thinking about \"ranking\" and start thinking about \"getting cited.\" The goal isn't position 1 anymore. The goal is being the source AI trusts enough to name.", "c": "geo"}, {"t": "GEO isn't complicated. Write clearly. Answer real questions. Structure your content well. Keep it updated. That's 80% of the work right there.", "c": "geo"}, {"t": "Your website isn't just a portfolio anymore. It's a knowledge base that AI reads to decide whether to recommend you. Treat it like one.", "c": "geo"}, {"t": "AI doesn't care how pretty your site is. It cares how clear, detailed, and authoritative your content is. Design impresses humans. Content impresses AI.", "c": "geo"}, {"t": "The businesses that win in 2026 aren't the ones with the most followers. They're the ones AI trusts enough to recommend. Build trust through content, not clout.", "c": "geo"}, {"t": "You don't need to be a tech person to benefit from GEO. You need a website that clearly explains what you do, where you do it, and why you're great at it.", "c": "geo"}, {"t": "AI engines heavily favor third-party mentions over your own website content. Google reviews, directory listings, and features in publications all boost your GEO.", "c": "geo"}, {"t": "Every Google review you get is training AI to recommend you. AI reads reviews to determine quality, specialties, and reputation. More reviews = more AI trust.", "c": "geo"}, {"t": "Getting featured on a local blog or wedding directory does double duty in 2026. It helps your SEO backlinks AND gives AI another trusted source to cite you from.", "c": "geo"}, {"t": "Trust it. You are allowed to walk away at any point. Even mid-conversation, even after a call. You don't owe access to your time or energy.", "c": "boundaries"}, {"t": "Not every \"nice\" client is a good client. Nice doesn't mean respectful. Nice doesn't mean easy to work with. Nice doesn't mean they value your time.", "c": "boundaries"}, {"t": "If a potential client is already pushing back on your process before they've even booked… that's not enthusiasm. That's a preview.", "c": "boundaries"}, {"t": "You don't need to justify your pricing. You don't need to explain your timeline. You don't need to defend your process. The right clients won't ask you to.", "c": "boundaries"}, {"t": "A red flag doesn't stop being a red flag just because they complimented your work. Flattery and respect are not the same thing.", "c": "boundaries"}, {"t": "Missed deadlines, late content, scattered communication… that's not something you need to absorb. You can't do great work for someone who won't meet you halfway.", "c": "boundaries"}, {"t": "The best results come from collaboration, not chasing. If you feel like you're managing the client more than the project… that's your sign.", "c": "boundaries"}, {"t": "That dynamic rarely improves. Not every paying client is a good client. Money doesn't outweigh stress, time drain, and constant friction.", "c": "boundaries"}, {"t": "The way someone shows up before booking is the easiest preview. Pay attention to it. It usually doesn't magically change later.", "c": "boundaries"}, {"t": "You don't need to overextend to prove you care. Going above and beyond for the wrong client just teaches them to expect more without respect.", "c": "boundaries"}, {"t": "A misaligned client will make a smooth process feel chaotic. Even when you've done everything right.", "c": "boundaries"}, {"t": "You're allowed to protect your energy mid-project too. Boundaries don't disappear once a contract is signed.", "c": "boundaries"}, {"t": "Clear expectations don't fix difficult behavior. Some clients don't want structure, they want control. That's a completely different situation.", "c": "boundaries"}, {"t": "You're not bad at business for walking away from chaos. You're getting better at protecting it.", "c": "boundaries"}, {"t": "Your process exists for a reason. If someone wants to skip steps, rush timelines, or ignore your expertise… they're not your client.", "c": "boundaries"}, {"t": "Saying no to the wrong client makes room for the right one. Every chaotic project you take is time stolen from a dream client who would've been easy.", "c": "boundaries"}, {"t": "You built your business to have freedom. Don't let one difficult client take that from you. Protect what you built.", "c": "boundaries"}, {"t": "Boundaries aren't mean. Boundaries are how you stay in business long enough to help the people who actually deserve your work.", "c": "boundaries"}, {"t": "The client who respects your process, trusts your expertise, and shows up on time? That's the one worth bending over backwards for. Not the one who makes everything harder.", "c": "boundaries"}, {"t": "If their energy drains you before the project even starts… imagine how you'll feel at revision three. Listen to that feeling.", "c": "boundaries"}, {"t": "You are allowed to have a vetting process. You are allowed to say 'I don't think we're the right fit.' That's not rejection — that's professionalism.", "c": "boundaries"}, {"t": "A full calendar of wrong-fit clients is worse than a lighter calendar of dream clients. Volume isn't the goal. Alignment is.", "c": "boundaries"}, {"t": "You don't owe anyone a discount because they \"can't afford it right now.\" Your rate reflects your skill, your time, and your results.", "c": "boundaries"}, {"t": "Stop replying to inquiries at 10pm. Stop answering texts on weekends. The clients worth having will respect your hours.", "c": "boundaries"}, {"t": "When someone keeps changing the scope, moving goalposts, or adding \"just one more thing\"… that's not collaboration. That's them testing how much you'll give away for free.", "c": "boundaries"}, {"t": "'I'll just do this one extra thing for free' is how you train clients to expect free work forever. Generosity without boundaries isn't kindness — it's a business leak.", "c": "boundaries"}, {"t": "You are not responsible for managing a client's emotions about your pricing. Your rate is your rate. The right people won't flinch.", "c": "boundaries"}, {"t": "Scope creep doesn't start big. It starts with 'can you also…' and 'while you're in there…' If it wasn't in the contract, it's a new project.", "c": "boundaries"}, {"t": "Stop apologizing for having a process. You don't see your doctor apologizing for making you fill out forms first. Structure is professional.", "c": "boundaries"}, {"t": "That guilt you feel when you say no? That's conditioning, not intuition. Saying no to protect your business is one of the most responsible things you can do.", "c": "boundaries"}, {"t": "A client who ghosts for weeks then expects you to drop everything when they're finally ready? That's not flexibility — that's disrespect for your time.", "c": "boundaries"}, {"t": "Your inbox is not a 24/7 customer service desk. Responding within business hours is professional. Responding at midnight is a pattern you'll regret.", "c": "boundaries"}, {"t": "'But they're so nice!' Cool. Nice doesn't pay for the 17 extra revisions they asked for. Nice doesn't respect your timeline. Evaluate actions, not vibes.", "c": "boundaries"}, {"t": "You don't owe anyone a discount for being loyal. Repeat clients get your best work and your attention — that IS the perk.", "c": "boundaries"}, {"t": "If you dread opening their messages, that's data. Your nervous system is telling you something your invoice can't.", "c": "boundaries"}, {"t": "Raising your prices isn't greedy. It's growth. The clients who leave over a price increase were never going to value your evolution.", "c": "boundaries"}, {"t": "You don't need to explain WHY you're unavailable. 'I'm not available that day' is a complete sentence.", "c": "boundaries"}, {"t": "'Can I just pick your brain?' is code for 'Can I get your expertise for free?' Your knowledge has value. Protect it.", "c": "boundaries"}, {"t": "A client who compares your pricing to someone cheaper is telling you they don't understand the difference. That's not your problem to solve.", "c": "boundaries"}, {"t": "The fastest way to burn out isn't too many clients. It's too many wrong clients. One bad fit drains more energy than three dream projects.", "c": "boundaries"}, {"t": "Urgency is not your emergency. When a client creates chaos with poor planning, you don't have to absorb their stress. Help them — on your terms.", "c": "boundaries"}, {"t": "Requiring a deposit before starting work isn't rude. It's how real businesses operate. Anyone offended by that isn't ready to work with you.", "c": "boundaries"}, {"t": "You're allowed to fire a client. Read that again. You are allowed to end a working relationship that's costing you more than it's paying.", "c": "boundaries"}, {"t": "Stop treating every inquiry like it might be 'the one.' Vet before you invest. A discovery call should qualify THEM, not just sell you.", "c": "boundaries"}, {"t": "The client who trusts you doesn't micromanage every decision. If someone hired you but won't let you do your job, that's not collaboration — it's control.", "c": "boundaries"}, {"t": "Your contract isn't just paperwork. It's your protection. If it feels awkward to enforce it, remember: that's exactly why it exists.", "c": "boundaries"}, {"t": "Rest is not laziness. Taking a day off doesn't make you less dedicated. It makes you less likely to burn your whole business down from exhaustion.", "c": "boundaries"}, {"t": "You don't have to match someone else's urgency in your DMs. Read it, process it, respond when you're ready. Reactive replies lead to regret.", "c": "boundaries"}, {"t": "If they want champagne results on a water budget, that's not your problem to solve. You can't pour from a half-funded project.", "c": "boundaries"}, {"t": "The moment you start resenting the work is the moment you waited too long to set a boundary. Don't let it get there.", "c": "boundaries"}, {"t": "Your business model should serve YOUR life, not just your clients' timelines. If you built this for freedom, stop running it like a prison.", "c": "boundaries"}, {"t": "Not every referral is a good referral. Someone's friend isn't automatically your ideal client. You're still allowed to say no.", "c": "boundaries"}, {"t": "A polite no now saves you from a resentful yes for the next 6 weeks. Choose the discomfort that lasts 30 seconds over the one that lasts months.", "c": "boundaries"}, {"t": "You don't have to offer payment plans, rush delivery, or custom packages for everyone who asks. Your standard offer exists for a reason.", "c": "boundaries"}, {"t": "The best boundary you can set is a clear onboarding process. When expectations are crystal clear from day one, difficult clients often filter themselves out.", "c": "boundaries"}, {"t": "That gut feeling about a client? It's not anxiety. It's pattern recognition. Your intuition has been collecting data long before your brain catches up. Trust it.", "c": "boundaries"}, {"t": "Red flags don't get better after you sign the contract. They get louder. If something feels off during the inquiry stage, booking them won't fix it. It'll just make it your problem for longer.", "c": "boundaries"}, {"t": "If you have to convince yourself a client will be fine — they won't be. The dream clients don't require a pep talk before onboarding. You just know.", "c": "boundaries"}, {"t": "That feeling in your stomach when you read their message? That's not nerves. That's your intuition waving a giant red flag. Stop talking yourself out of what your body already knows.", "c": "boundaries"}, {"t": "A client who disrespects your time during the inquiry process will absolutely disrespect your time during the project. The audition works both ways.", "c": "boundaries"}, {"t": "You've worked with enough clients to know the difference between excited energy and chaotic energy. One fuels the project. The other drains it. Trust yourself to tell the difference.", "c": "boundaries"}, {"t": "When every message from a potential client comes with a 'but' — but can you do it faster, but can you do it cheaper, but can you add this — that's not negotiation. That's a preview of the entire project.", "c": "boundaries"}, {"t": "Your intuition isn't dramatic. It's data. Every past project that went sideways taught you something. Those lessons live in your gut now. Listen.", "c": "boundaries"}, {"t": "Not booking a client because something feels off isn't leaving money on the table. It's keeping your calendar open for someone who actually respects what you do.", "c": "boundaries"}, {"t": "The biggest red flag? When a potential client tells you how their last designer did everything wrong. You're not the exception to their pattern. You're the next chapter of it.", "c": "boundaries"}, {"t": "If they can't follow simple instructions on your inquiry form, imagine what revisions will look like. Small things are big data.", "c": "boundaries"}, {"t": "'I know exactly what I want' from a client who can't articulate any of it? Red flag. That usually means they'll know it when they see it — and they won't see it until revision twelve.", "c": "boundaries"}, {"t": "Stop ignoring the red flags because the deposit is tempting. The money isn't worth it if the project costs you your peace, your time, and three weeks of stress.", "c": "boundaries"}, {"t": "A client who name-drops other designers they've 'outgrown' isn't complimenting you. They're warning you. You're not special to them — you're next.", "c": "boundaries"}, {"t": "You didn't build this business to dread your inbox. If a potential client's first message makes your shoulders tense, that's all the information you need.", "c": "boundaries"}
    {"t":"Every word on your website was chosen for a reason. When you swap out a heading because you prefer different phrasing, you might be removing the exact keyword that gets you found on Google.","c":"trust-the-designer"},
    {"t":"Your designer isn't just making things pretty. They're building a system — every heading, every photo placement, every button is guiding your ideal client toward booking you.","c":"trust-the-designer"},
    {"t":"I know it's tempting to rearrange your homepage because it doesn't feel like you. But it was designed to feel like your CLIENT — the one who's about to book you.","c":"trust-the-designer"},
    {"t":"When you move a photo from the top of the page to the bottom because you like it better there, you might be breaking the visual flow that was designed to keep visitors scrolling.","c":"trust-the-designer"},
    {"t":"Your website isn't a scrapbook. It's a sales tool. Every element is placed strategically to convert visitors into inquiries. Trust the strategy behind the design.","c":"trust-the-designer"},
    {"t":"The heading that says what you do and where you do it might feel boring to you. But it's exactly what Google needs to rank you and exactly what clients need to trust you.","c":"trust-the-designer"},
    {"t":"You hired a designer because you wanted expert results. Redesigning it yourself after launch is like hiring a chef and then seasoning the dish yourself before it leaves the kitchen.","c":"trust-the-designer"},
    {"t":"That white space you want to fill? It's doing a job. White space makes your content breathable, scannable, and professional. Cramming in more content makes it feel overwhelming.","c":"trust-the-designer"},
    {"t":"Your designer tested that button color, that font size, that layout on multiple devices. What looks off on your laptop might look perfect on the phone where 70% of your clients will see it.","c":"trust-the-designer"},
    {"t":"When you change the call-to-action from 'Book a Consultation' to 'Let's Chat,' you're making it vaguer. Clear beats cute when it comes to getting people to take action.","c":"trust-the-designer"},
    {"t":"Every photo on your site was placed to tell a story in a specific order. Moving them around because you have a favorite disrupts the narrative that was designed to build trust.","c":"trust-the-designer"},
    {"t":"Your designer writes headings that include the words people actually search on Google. Changing them to something clever or poetic might sound better to you but disappears from search results.","c":"trust-the-designer"},
    {"t":"I get it — it's your business and you want it to feel like you. But your website's job isn't to make you happy. It's to make your ideal client confident enough to reach out.","c":"trust-the-designer"},
    {"t":"The font your designer chose wasn't random. It was selected for readability, brand alignment, and web performance. Swapping it for something you saw on Pinterest could hurt all three.","c":"trust-the-designer"},
    {"t":"Your about page is structured to build credibility in a specific order — hook, story, credentials, call to action. Rearranging it because you want your bio first breaks the persuasion flow.","c":"trust-the-designer"},
    {"t":"Adding a wall of text to a page designed with concise copy is like turning a clean, modern room into a cluttered storage closet. Less copy, strategically placed, converts better.","c":"trust-the-designer"},
    {"t":"You might not love the photo your designer chose for the hero section. But they chose it because it's high quality, shows your work clearly, and loads fast. Your favorite photo might do none of those things.","c":"trust-the-designer"},
    {"t":"When you add your own pages, sections, or pop-ups without consulting your designer, you risk breaking the site structure that Google uses to understand and rank your content.","c":"trust-the-designer"},
    {"t":"Your designer built your site with a content hierarchy — H1, H2, H3 headings in a specific order. Changing heading sizes because you want something bigger can confuse Google about what your page is about.","c":"trust-the-designer"},
    {"t":"That testimonial placement wasn't random. Social proof works best at specific points in the page flow — right before a call to action, not buried at the bottom where nobody scrolls.","c":"trust-the-designer"},
    {"t":"Changing your brand colors on your website because you're tired of them doesn't just affect aesthetics — it breaks brand consistency across every platform where clients encounter you.","c":"trust-the-designer"},
    {"t":"Your designer gave you three portfolio images per row for a reason. Adding more makes them too small to appreciate. Showing fewer wastes valuable scroll space. Three is the sweet spot.","c":"trust-the-designer"},
    {"t":"The reason your designer said no to that carousel slider isn't because they're being difficult. It's because sliders kill page speed, hurt SEO, and most visitors never click past the first slide.","c":"trust-the-designer"},
    {"t":"You wouldn't tell your accountant how to file your taxes or your doctor how to read your labs. Your web designer studied conversion, user experience, and SEO strategy. Let them do their job.","c":"trust-the-designer"},

        function updateStory() {
            const storyText = document.getElementById('storyText');

                // Removed updateProgressDots() call since dots are hidden
                storyCard.classList.remove('changing');

        }

        function updateProgressDots() {
            const dotsContainer = document.getElementById('progressDots');
            dotsContainer.innerHTML = '';
            
            // Show max 20 dots to avoid clutter
            const maxDots = Math.min(20, stories.length);
            const increment = Math.ceil(stories.length / maxDots);
            
            for (let i = 0; i < maxDots; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                
                const storyIndex = i * increment;
                if (currentIndex >= storyIndex && currentIndex < storyIndex + increment) {
                    dot.classList.add('active');
                }
                
                dotsContainer.appendChild(dot);
            }
        }

        function nextStory() {
            currentIndex = (currentIndex + 1) % stories.length;
            updateStory();
        }

        function prevStory() {
            currentIndex = (currentIndex - 1 + stories.length) % stories.length;
            updateStory();
        }

        function copyToClipboard() {
            const text = stories[currentIndex].t;
            const copyBtn = document.getElementById('copyBtn');
            const editableText = document.getElementById('editableText');
            
            // Always populate the text box first
            editableText.value = text;
            
            // Try modern clipboard API first
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopySuccess(copyBtn, 'copy text');
                }).catch(() => {
                    // If modern API fails, use fallback
                    fallbackCopy(text, copyBtn, 'copy text');
                });
            } else {
                // Use fallback for HTTP or older browsers
                fallbackCopy(text, copyBtn, 'copy text');
            }
        }

        function copyTextboxContent() {

                textCopyBtn.textContent = 'nothing to copy';

        function fallbackCopy(text, button, originalText) {
            try {
                // Create temporary textarea for copying
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-999999px';
                textarea.style.top = '-999999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                
                // Try the old execCommand method
                const successful = document.execCommand('copy');
                document.body.removeChild(textarea);
                
                if (successful) {
                    showCopySuccess(button, originalText);
                } else {
                    // If all else fails, show the text selected in the text box for manual copy
                    if (button.id === 'textCopyBtn') {
                        const editableText = document.getElementById('editableText');
                        editableText.focus();
                        editableText.select();
                    }
                    button.textContent = 'select & copy manually';
                    setTimeout(() => {
                        button.textContent = originalText;

                button.textContent = 'select & copy manually';

        function storeToMemory() {
            const editableText = document.getElementById('editableText');
            const storeBtn = document.getElementById('textStoreBtn');
            const originalStory = stories[currentIndex].t;
            const revisedStory = editableText.value.trim();
            
            if (!revisedStory) {

                    storeBtn.textContent = 'store to memory';
                }, 2000);
                return;
            }
            
            // Create memory entry
            const memoryEntry = {
                timestamp: new Date().toISOString(),
                original: originalStory,
                revised: revisedStory,
                storyIndex: currentIndex + 1,
                changes: analyzeChanges(originalStory, revisedStory)
            };
            
            // Store in localStorage for now (could be enhanced to sync with server)
            let storyMemory = JSON.parse(localStorage.getItem('kathryn_story_preferences') || '[]');
            storyMemory.push(memoryEntry);
            
            // Keep only last 50 entries to avoid storage bloat
            if (storyMemory.length > 50) {
                storyMemory = storyMemory.slice(-50);
            }
            
            localStorage.setItem('kathryn_story_preferences', JSON.stringify(storyMemory));
            
            showStoreSuccess(storeBtn);

        function analyzeChanges(original, revised) {
            const changes = [];
            
            // Analyze length change
            const lengthDiff = revised.length - original.length;
            if (Math.abs(lengthDiff) > 20) {
                changes.push(lengthDiff > 0 ? 'made_longer' : 'made_shorter');
            }
            
            // Check for added/removed elements
            if (revised.includes('✨') && !original.includes('✨')) changes.push('added_sparkles');
            if (revised.includes('💡') && !original.includes('💡')) changes.push('added_lightbulb');
            if (revised.includes('🎯') && !original.includes('🎯')) changes.push('added_target');
            if (revised.includes('📈') && !original.includes('📈')) changes.push('added_chart');
            
            // Check for style changes
            if (revised.includes('!') && !original.includes('!')) changes.push('added_excitement');
            if (revised.includes('?') && !original.includes('?')) changes.push('added_question');
            
            // Check for personal touches
            if (revised.toLowerCase().includes('you') && !original.toLowerCase().includes('you')) {
                changes.push('made_more_personal');
            }
            
            return changes;
        }
